name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "web/backend/**"
      - "ops/pm2/**"
      - "ops/deploy-backend.sh"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: web/backend
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER || 'ec2-user' }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/goose-web/backend' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/backend/package-lock.json

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH key
        run: |
          KEY_FILE="${RUNNER_TEMP}/ec2_ssh_key"
          printf '%s\n' "${EC2_SSH_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          echo "EC2_SSH_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        working-directory: .

      - name: Ensure remote app directory
        run: |
          ssh -i "${EC2_SSH_KEY_FILE}" \
            -o StrictHostKeyChecking=accept-new \
            "${EC2_USER}@${EC2_HOST}" \
            "mkdir -p '${EC2_APP_DIR}'"
        working-directory: .

      - name: Rsync dist and manifests
        run: |
          RSYNC_RSH="ssh -i ${EC2_SSH_KEY_FILE} -o StrictHostKeyChecking=accept-new"

          rsync -avz -e "${RSYNC_RSH}" \
            --delete \
            --exclude node_modules \
            web/backend/dist/ \
            "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/dist/"

          rsync -avz -e "${RSYNC_RSH}" \
            web/backend/package.json \
            web/backend/package-lock.json \
            ops/pm2/ecosystem.config.cjs \
            "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/"
        working-directory: .

      - name: Remote npm ci and pm2 reload
        run: |
          ssh -i "${EC2_SSH_KEY_FILE}" \
            -o StrictHostKeyChecking=accept-new \
            "${EC2_USER}@${EC2_HOST}" \
            bash -s -- "${EC2_APP_DIR}" <<'EOF'
          set -euo pipefail
          APP_DIR="$1"
          cd "$APP_DIR"

          if [[ ! -f /etc/goose-web.env ]]; then
            echo "error: missing /etc/goose-web.env — copy ops/env/goose-web.env.example on the server first" >&2
            exit 1
          fi

          npm ci --omit=dev

          if pm2 describe goose-web >/dev/null 2>&1; then
            pm2 reload ecosystem.config.cjs --update-env
          else
            pm2 start ecosystem.config.cjs
          fi
          pm2 save
          pm2 status goose-web
          EOF
        working-directory: .
