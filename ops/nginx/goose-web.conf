# Goose web API — nginx reverse proxy to pm2 (Node on 127.0.0.1:3001)
# Install: sudo cp goose-web.conf /etc/nginx/conf.d/goose-web.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# TLS: add listen 443 ssl + certificates (certbot) and redirect :80 → https.

upstream goose_web_node {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    # Uncomment after certbot (or terminate TLS elsewhere):
    # return 301 https://$host$request_uri;

    client_max_body_size 1m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    location /health {
        proxy_pass http://goose_web_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://goose_web_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

